  <main>

    <!-- HERO -->
    <section class="relative h-[50vh] min-h-[320px] flex items-center pt-16">
      <div class="absolute inset-0 overflow-hidden">
        <img src="images/IMG_9676-2-scaled.jpg"
             alt="" class="hero-parallax absolute top-1/2 left-0 w-full h-[150%] object-cover object-center will-change-transform" style="filter: saturate(0.08)" />
        <div class="absolute inset-0 bg-black/55"></div>
      </div>
      <div class="relative max-w-6xl mx-auto px-8 text-center">
        <h1 class="text-3xl md:text-5xl font-mincho text-white tracking-wide mb-4">つながる</h1>
        <p class="text-xs tracking-[0.4rem] text-white/60">CONTACT</p>
      </div>
    </section>


    <!-- FORM -->
    <section class="py-28">
      <div class="max-w-6xl mx-auto px-8 grid md:grid-cols-12 gap-16">
        <div class="md:col-span-3 flex flex-col gap-4 pt-2">
          <span class="text-xs tracking-[0.4rem] text-muted">FORM</span>
          <span class="block w-8 h-px bg-footer"></span>
        </div>
        <div class="md:col-span-9">

          <!-- SUCCESS MESSAGE -->
          <div id="form-success" class="hidden flex flex-col gap-4 py-12">
            <span class="block w-8 h-px bg-footer"></span>
            <p class="text-xl font-light leading-loose tracking-wide">お問い合わせありがとうございます。</p>
            <p class="text-base leading-loose text-muted">内容を確認のうえ、担当者よりご連絡いたします。</p>
          </div>

          <!-- ERROR MESSAGE -->
          <div id="form-error" class="hidden mb-6 text-xs text-red-500 tracking-wide">
            送信に失敗しました。しばらく経ってから再度お試しください。
          </div>

          <form id="contact-form" class="flex flex-col gap-8" novalidate>
            <!-- Formspree honeypot (spam protection) -->
            <input type="text" name="_gotcha" class="hidden" tabindex="-1" autocomplete="off" />

            <!-- 氏名 -->
            <div class="flex flex-col gap-2">
              <label for="name" class="text-xs font-medium tracking-[0.2rem]">
                氏名 <span class="text-muted font-normal ml-1">必須</span>
              </label>
              <input
                type="text"
                id="name"
                name="name"
                required
                autocomplete="name"
                placeholder="山田 花子"
                class="border-b border-gray-300 focus:border-black outline-none py-3 text-base placeholder:text-gray-300 transition-colors bg-transparent"
              />
            </div>

            <!-- メールアドレス -->
            <div class="flex flex-col gap-2">
              <label for="email" class="text-xs font-medium tracking-[0.2rem]">
                メールアドレス <span class="text-muted font-normal ml-1">必須</span>
              </label>
              <input
                type="email"
                id="email"
                name="_replyto"
                required
                autocomplete="email"
                placeholder="example@email.com"
                class="border-b border-gray-300 focus:border-black outline-none py-3 text-base placeholder:text-gray-300 transition-colors bg-transparent"
              />
            </div>

            <!-- お問い合わせ内容 -->
            <div class="flex flex-col gap-2">
              <label for="category" class="text-xs font-medium tracking-[0.2rem]">
                お問い合わせ内容 <span class="text-muted font-normal ml-1">必須</span>
              </label>
              <div class="relative">
                <select
                  id="category"
                  name="category"
                  required
                  class="w-full border-b border-gray-300 focus:border-black outline-none py-3 text-base appearance-none bg-transparent pr-8 transition-colors"
                >
                  <option value="" disabled selected>選択してください</option>
                  <option value="お仕事の依頼・相談">お仕事の依頼・相談</option>
                  <option value="支援活動について">支援活動について</option>
                  <option value="その他のお問い合わせ">その他のお問い合わせ</option>
                </select>
                <span class="pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 text-muted text-xs">▼</span>
              </div>
            </div>

            <!-- 詳細 -->
            <div class="flex flex-col gap-2">
              <label for="message" class="text-xs font-medium tracking-[0.2rem]">
                お問い合わせについての詳細 <span class="text-muted font-normal ml-1">必須</span>
              </label>
              <textarea
                id="message"
                name="message"
                required
                rows="6"
                placeholder="詳細をご記入ください。"
                class="border-b border-gray-300 focus:border-black outline-none py-3 text-base placeholder:text-gray-300 transition-colors bg-transparent resize-none"
              ></textarea>
            </div>

            <!-- SUBMIT -->
            <div class="pt-4">
              <button
                type="submit"
                id="submit-btn"
                class="inline-flex items-center gap-3 border border-black text-xs tracking-[0.2rem] px-10 py-3.5 hover:bg-black hover:text-white transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
              >
                <span id="submit-label">送信する →</span>
              </button>
            </div>

          </form>
        </div>
      </div>
    </section>

  </main>
